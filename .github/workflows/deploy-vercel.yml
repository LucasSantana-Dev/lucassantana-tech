name: Deploy Vercel

on:
  pull_request:
    branches:
      - main
    types:
      - opened
      - synchronize
      - reopened
      - ready_for_review
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: deploy-vercel-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  preview:
    name: Preview Deploy
    permissions:
      contents: read
      pull-requests: write
    if: >-
      ${{
        github.event_name == 'pull_request' &&
        !github.event.pull_request.draft &&
        !github.event.pull_request.head.repo.fork
      }}
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Check required secrets
        id: vercel_secrets
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        run: |
          set -euo pipefail
          if [ -n "$VERCEL_TOKEN" ] && [ -n "$VERCEL_ORG_ID" ] && [ -n "$VERCEL_PROJECT_ID" ] && \
            npx vercel whoami --token "$VERCEL_TOKEN" >/dev/null 2>&1; then
            echo "has_secrets=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_secrets=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Skip when secrets are missing
        if: ${{ steps.vercel_secrets.outputs.has_secrets != 'true' }}
        run: |
          echo "::notice::Vercel preview deploy skipped (missing VERCEL_TOKEN/VERCEL_ORG_ID/VERCEL_PROJECT_ID)."

      - name: Pull Vercel preview environment
        if: ${{ steps.vercel_secrets.outputs.has_secrets == 'true' }}
        run: npx vercel pull --yes --environment=preview --token="$VERCEL_TOKEN"

      - name: Build Vercel artifacts
        if: ${{ steps.vercel_secrets.outputs.has_secrets == 'true' }}
        run: npx vercel build --token="$VERCEL_TOKEN"

      - name: Deploy preview to Vercel
        id: deploy_preview
        if: ${{ steps.vercel_secrets.outputs.has_secrets == 'true' }}
        run: |
          set -euo pipefail
          set +e
          OUTPUT="$(npx vercel deploy --prebuilt --target=preview --token="$VERCEL_TOKEN" --no-color 2>&1)"
          DEPLOY_EXIT=$?
          set -e
          if [ "$DEPLOY_EXIT" -ne 0 ]; then
            if echo "$OUTPUT" | grep -Eiq 'rate limit|too many requests|retry in|limit exceeded|resource is limited|api-deployments-free-per-day'; then
              echo "::notice::Vercel preview deploy skipped due provider rate limit."
              echo "skipped=true" >> "$GITHUB_OUTPUT"
              exit 0
            fi
            echo "::error::Vercel preview deploy failed."
            echo "$OUTPUT"
            exit "$DEPLOY_EXIT"
          fi
          DEPLOY_URL="$(echo "$OUTPUT" | grep -Eo 'https://[^ ]+\.vercel\.app' | tail -n 1 || true)"
          if [ -z "$DEPLOY_URL" ]; then
            echo "::notice::Vercel preview deploy completed without a parsed preview URL."
            echo "skipped=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "url=$DEPLOY_URL" >> "$GITHUB_OUTPUT"

      - name: Comment skipped preview reason
        if: ${{ steps.deploy_preview.outputs.skipped == 'true' }}
        uses: actions/github-script@v7
        with:
          script: |
            const marker = "<!-- vercel-preview-comment -->";
            const body = [
              marker,
              "### Vercel Preview",
              "",
              "Preview skipped in CI (Vercel provider rate limit or URL not returned).",
            ].join("\n");
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const existing = comments.find((comment) => comment.body?.includes(marker));
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }

      - name: Comment preview URL
        if: ${{ steps.deploy_preview.outputs.url != '' }}
        uses: actions/github-script@v7
        env:
          PREVIEW_URL: ${{ steps.deploy_preview.outputs.url }}
        with:
          script: |
            const marker = "<!-- vercel-preview-comment -->";
            const body = [
              marker,
              "### Vercel Preview",
              "",
              `Preview URL: ${process.env.PREVIEW_URL}`,
            ].join("\n");
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const existing = comments.find((comment) => comment.body?.includes(marker));
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }

  production:
    name: Production Deploy
    if: >-
      ${{
        (
          github.event_name == 'workflow_dispatch' ||
          github.event_name == 'push'
        ) &&
        github.ref == 'refs/heads/main'
      }}
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Check required secrets
        id: vercel_secrets
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        run: |
          set -euo pipefail
          if [ -z "$VERCEL_TOKEN" ] || [ -z "$VERCEL_ORG_ID" ] || [ -z "$VERCEL_PROJECT_ID" ]; then
            echo "::error::Missing required Vercel secrets: VERCEL_TOKEN/VERCEL_ORG_ID/VERCEL_PROJECT_ID."
            exit 1
          fi
          if ! npx vercel whoami --token "$VERCEL_TOKEN" >/dev/null 2>&1; then
            echo "::error::Invalid Vercel token for production deployment."
            exit 1
          fi
          echo "has_secrets=true" >> "$GITHUB_OUTPUT"

      - name: Pull Vercel production environment
        if: ${{ steps.vercel_secrets.outputs.has_secrets == 'true' }}
        run: npx vercel pull --yes --environment=production --token="$VERCEL_TOKEN"

      - name: Build Vercel artifacts
        if: ${{ steps.vercel_secrets.outputs.has_secrets == 'true' }}
        run: npx vercel build --prod --token="$VERCEL_TOKEN"

      - name: Deploy production to Vercel
        if: ${{ steps.vercel_secrets.outputs.has_secrets == 'true' }}
        run: npx vercel deploy --prebuilt --prod --token="$VERCEL_TOKEN"
