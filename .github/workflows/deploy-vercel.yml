name: Deploy Vercel

on:
  pull_request:
    branches:
      - main
    types:
      - opened
      - synchronize
      - reopened
      - ready_for_review
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: deploy-vercel-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  preview:
    name: Preview Deploy
    if: >-
      ${{
        github.event_name == 'pull_request' &&
        !github.event.pull_request.draft &&
        secrets.VERCEL_TOKEN != '' &&
        secrets.VERCEL_ORG_ID != '' &&
        secrets.VERCEL_PROJECT_ID != ''
      }}
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Pull Vercel preview environment
        run: npx vercel pull --yes --environment=preview --token="$VERCEL_TOKEN"

      - name: Build Vercel artifacts
        run: npx vercel build --token="$VERCEL_TOKEN"

      - name: Deploy preview to Vercel
        id: deploy_preview
        run: |
          set -euo pipefail
          DEPLOY_URL="$(npx vercel deploy --prebuilt --target=preview --token="$VERCEL_TOKEN" | tail -n 1)"
          echo "url=$DEPLOY_URL" >> "$GITHUB_OUTPUT"

      - name: Comment preview URL
        if: ${{ steps.deploy_preview.outputs.url != '' }}
        uses: actions/github-script@v7
        env:
          PREVIEW_URL: ${{ steps.deploy_preview.outputs.url }}
        with:
          script: |
            const body = [
              "### Vercel Preview",
              "",
              `Preview URL: ${process.env.PREVIEW_URL}`,
            ].join("\n");
            github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body,
            });

  production:
    name: Production Deploy
    if: >-
      ${{
        (
          github.event_name == 'workflow_dispatch' ||
          (github.event_name == 'push' && github.ref == 'refs/heads/main')
        ) &&
        secrets.VERCEL_TOKEN != '' &&
        secrets.VERCEL_ORG_ID != '' &&
        secrets.VERCEL_PROJECT_ID != ''
      }}
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Pull Vercel production environment
        run: npx vercel pull --yes --environment=production --token="$VERCEL_TOKEN"

      - name: Build Vercel artifacts
        run: npx vercel build --prod --token="$VERCEL_TOKEN"

      - name: Deploy production to Vercel
        run: npx vercel deploy --prebuilt --prod --token="$VERCEL_TOKEN"
