name: Deploy Cloudflare Pages

on:
  pull_request:
    branches:
      - main
    types:
      - opened
      - synchronize
      - reopened
      - ready_for_review
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: deploy-cloudflare-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  preview:
    name: Preview Deploy
    if: >-
      ${{
        github.event_name == 'pull_request' &&
        !github.event.pull_request.draft &&
        !github.event.pull_request.head.repo.fork
      }}
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Check required secrets
        id: cloudflare_secrets
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          set -euo pipefail
          if [ -n "$CLOUDFLARE_API_TOKEN" ] && [ -n "$CLOUDFLARE_ACCOUNT_ID" ] && \
            npx wrangler whoami >/dev/null 2>&1; then
            echo "has_secrets=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_secrets=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Skip when secrets are missing
        if: ${{ steps.cloudflare_secrets.outputs.has_secrets != 'true' }}
        run: |
          echo "::notice::Cloudflare preview deploy skipped (missing CLOUDFLARE_API_TOKEN/CLOUDFLARE_ACCOUNT_ID)."

      - name: Deploy preview to Cloudflare Pages
        id: deploy_preview
        if: ${{ steps.cloudflare_secrets.outputs.has_secrets == 'true' }}
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          set -euo pipefail
          OUTPUT_FILE="$(mktemp)"
          PREVIEW_BRANCH="pr-${{ github.event.number }}"
          npx wrangler pages deploy dist \
            --project-name lucassantana-tech \
            --branch "$PREVIEW_BRANCH" 2>&1 | tee "$OUTPUT_FILE"
          DEPLOY_URL="$(grep -Eo 'https://[a-z0-9-]+\.lucassantana-tech\.pages\.dev' "$OUTPUT_FILE" | tail -n 1 || true)"
          if [ -n "$DEPLOY_URL" ]; then
            echo "url=$DEPLOY_URL" >> "$GITHUB_OUTPUT"
          fi

      - name: Comment preview URL
        if: ${{ steps.deploy_preview.outputs.url != '' }}
        uses: actions/github-script@v7
        env:
          PREVIEW_URL: ${{ steps.deploy_preview.outputs.url }}
        with:
          script: |
            const marker = "<!-- cloudflare-preview-comment -->";
            const body = [
              marker,
              "### Cloudflare Preview",
              "",
              `Preview URL: ${process.env.PREVIEW_URL}`,
            ].join("\n");
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const existing = comments.find((comment) => comment.body?.includes(marker));
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }

  production:
    name: Production Deploy
    if: ${{ github.event_name == 'workflow_dispatch' && github.ref == 'refs/heads/main' }}
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Check required secrets
        id: cloudflare_secrets
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          set -euo pipefail
          if [ -n "$CLOUDFLARE_API_TOKEN" ] && [ -n "$CLOUDFLARE_ACCOUNT_ID" ] && \
            npx wrangler whoami >/dev/null 2>&1; then
            echo "has_secrets=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_secrets=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Skip when secrets are missing
        if: ${{ steps.cloudflare_secrets.outputs.has_secrets != 'true' }}
        run: |
          echo "::notice::Cloudflare production deploy skipped (missing CLOUDFLARE_API_TOKEN/CLOUDFLARE_ACCOUNT_ID)."

      - name: Deploy production to Cloudflare Pages
        if: ${{ steps.cloudflare_secrets.outputs.has_secrets == 'true' }}
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: npx wrangler pages deploy dist --project-name lucassantana-tech --branch main
