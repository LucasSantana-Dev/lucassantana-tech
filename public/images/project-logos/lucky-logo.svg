<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 120" width="400" height="120">
  <defs>
    <linearGradient id="lucky-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7C3AED"/>
      <stop offset="50%" stop-color="#8B5CF6"/>
      <stop offset="100%" stop-color="#A78BFA"/>
    </linearGradient>
    <linearGradient id="lucky-glow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#8B5CF6" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#7C3AED" stop-opacity="0"/>
    </linearGradient>
  </defs>
  
  <!-- Icon: Hexagonal hub with converging nodes -->
  <g transform="translate(60, 60)">
    <!-- Outer glow -->
    <circle cx="0" cy="0" r="48" fill="url(#lucky-glow)" opacity="0.3"/>
    
    <!-- Connection lines from outer nodes to center -->
    <line x1="0" y1="-38" x2="0" y2="-14" stroke="#8B5CF6" stroke-width="1.5" opacity="0.5"/>
    <line x1="33" y1="-19" x2="12" y2="-7" stroke="#8B5CF6" stroke-width="1.5" opacity="0.5"/>
    <line x1="33" y1="19" x2="12" y2="7" stroke="#8B5CF6" stroke-width="1.5" opacity="0.5"/>
    <line x1="0" y1="38" x2="0" y2="14" stroke="#8B5CF6" stroke-width="1.5" opacity="0.5"/>
    <line x1="-33" y1="19" x2="-12" y2="7" stroke="#8B5CF6" stroke-width="1.5" opacity="0.5"/>
    <line x1="-33" y1="-19" x2="-12" y2="-7" stroke="#8B5CF6" stroke-width="1.5" opacity="0.5"/>
    
    <!-- Inner hexagonal form -->
    <polygon points="0,-16 14,-8 14,8 0,16 -14,8 -14,-8" 
             fill="url(#lucky-grad)" opacity="0.9"/>
    
    <!-- Center diamond -->
    <polygon points="0,-8 8,0 0,8 -8,0" fill="#C4B5FD" opacity="0.9"/>
    
    <!-- Outer nodes -->
    <circle cx="0" cy="-38" r="4" fill="#8B5CF6"/>
    <circle cx="33" cy="-19" r="4" fill="#8B5CF6"/>
    <circle cx="33" cy="19" r="4" fill="#8B5CF6"/>
    <circle cx="0" cy="38" r="4" fill="#8B5CF6"/>
    <circle cx="-33" cy="19" r="4" fill="#8B5CF6"/>
    <circle cx="-33" cy="-19" r="4" fill="#8B5CF6"/>
    
    <!-- Node highlights -->
    <circle cx="0" cy="-38" r="2" fill="#C4B5FD" opacity="0.7"/>
    <circle cx="33" cy="-19" r="2" fill="#C4B5FD" opacity="0.7"/>
    <circle cx="33" cy="19" r="2" fill="#C4B5FD" opacity="0.7"/>
    <circle cx="0" cy="38" r="2" fill="#C4B5FD" opacity="0.7"/>
    <circle cx="-33" cy="19" r="2" fill="#C4B5FD" opacity="0.7"/>
    <circle cx="-33" cy="-19" r="2" fill="#C4B5FD" opacity="0.7"/>
  </g>
  
  <!-- Wordmark -->
  <text x="130" y="70" font-family="'Inter', 'Instrument Sans', 'Work Sans', -apple-system, sans-serif" 
        font-size="42" font-weight="600" letter-spacing="6" fill="white">
    LUCKY
  </text>
</svg>
